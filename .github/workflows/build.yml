name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Copy app icons
        run: |
          New-Item -ItemType Directory -Force -Path ui\build\windows | Out-Null
          Copy-Item ui\appicon.png ui\build\appicon.png
          Copy-Item ui\logo.ico ui\build\windows\icon.ico

      - name: Build executable
        run: cd ui && wails build -ldflags "-X main.Version=dev-${{ github.sha }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvino-desktop-${{ github.sha }}
          path: ui/build/bin/openvino-desktop.exe
          retention-days: 90
